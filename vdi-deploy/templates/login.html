<!DOCTYPE html><html><head><meta charset="utf-8"><title>VDI 管理登录</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"></head>
<body class="bg-light"><div class="container mt-5" style="max-width:400px">
<h3 class="mb-3">VDI 管理登录</h3>{% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
<form method="post"><input name="username" class="form-control mb-2" placeholder="用户名" required>
<input type="password" name="password" class="form-control mb-2" placeholder="密码" required>
<button type="submit" class="btn btn-primary w-100">登录</button></form></div></body></html>
