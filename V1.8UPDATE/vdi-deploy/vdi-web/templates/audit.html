<!DOCTYPE html><html><head><meta charset="utf-8"><title>审计日志</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"></head>
<body><div class="container mt-4"><div class="d-flex justify-content-between align-items-center mb-3"><h2>操作审计日志</h2><a href="/" class="btn btn-secondary">返回管理</a></div><hr>
<table class="table table-striped"><thead><tr><th>时间</th><th>操作者</th><th>操作</th><th>目标</th><th>详情</th><th>IP</th></tr></thead>
<tbody>{% for log in logs %}<tr><td>{{ log.created_at }}</td><td>{{ log.operator }}</td><td><span class="badge bg-secondary">{{ log.action }}</span></td><td>{{ log.target or '-' }}</td><td>{{ log.details or '-' }}</td><td>{{ log.ip_address }}</td></tr>{% endfor %}{% if not logs %}<tr><td colspan="6" class="text-center">暂无日志</td></tr>{% endif %}</tbody></table>
<nav><ul class="pagination">{% for p in range(1, total_pages + 1) %}<li class="page-item {% if p == page %}active{% endif %}"><a class="page-link" href="?page={{ p }}">{{ p }}</a></li>{% endfor %}</ul></nav></div></body></html>
