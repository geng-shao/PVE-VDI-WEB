<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>桌面使用统计</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>桌面使用统计</h2>
        <a href="/" class="btn btn-secondary btn-sm">返回首页</a>
    </div>
    <hr>
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card bg-primary text-white">
                <div class="card-body text-center">
                    <h3>{{ total_connects }}</h3>
                    <p>总连接次数</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-success text-white">
                <div class="card-body text-center">
                    <h3>{{ top_desktops|length }}</h3>
                    <p>活跃桌面数</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-info text-white">
                <div class="card-body text-center">
                    <h3>{{ daily_users|length }}</h3>
                    <p>活跃天数</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-warning text-white">
                <div class="card-body text-center">
                    <h3>{{ top_desktops[0].count if top_desktops else 0 }}</h3>
                    <p>最高单日连接</p>
                </div>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-md-6">
            <div class="card mb-4">
                <div class="card-header"><strong>热门桌面 TOP10</strong></div>
                <div class="card-body"><div id="topChart" style="height:350px"></div></div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card mb-4">
                <div class="card-header"><strong>每日活跃用户（近30天）</strong></div>
                <div class="card-body"><div id="dailyChart" style="height:350px"></div></div>
            </div>
        </div>
    </div>
</div>
<script>
var topChart = echarts.init(document.getElementById('topChart'));
topChart.setOption({
    tooltip: {}, xAxis: { type: 'category', data: [{%for d in top_desktops%}'{{d.connection_name}}'{%if not loop.last%},{%endif%}{%endfor%}] },
    yAxis: { type: 'value' },
    series: [{ data: [{%for d in top_desktops%}{{d.count}}{%if not loop.last%},{%endif%}{%endfor%}], type: 'bar' }]
});
var dailyChart = echarts.init(document.getElementById('dailyChart'));
dailyChart.setOption({
    tooltip: {}, xAxis: { type: 'category', data: [{%for d in daily_users%}'{{d.date}}'{%if not loop.last%},{%endif%}{%endfor%}] },
    yAxis: { type: 'value' },
    series: [{ data: [{%for d in daily_users%}{{d.users}}{%if not loop.last%},{%endif%}{%endfor%}], type: 'line', smooth: true }]
});
</script>
</body>
</html>
