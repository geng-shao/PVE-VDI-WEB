
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>申请桌面</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-4" style="max-width:500px">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>申请云桌面</h3>
        <a href="/" class="btn btn-secondary btn-sm">返回首页</a>
    </div>
    <hr>
    <div class="alert alert-info">
        此功能用于用户提交桌面申请，管理员审批后自动创建桌面。
    </div>
    {% with m=get_flashed_messages(with_categories=true) %}
      {% for c,msg in m %}
        <div class="alert alert-{{c}}">{{msg}}</div>
      {% endfor %}
    {% endwith %}
    <form method="post">
        <div class="mb-3">
            <label>申请人</label>
            <input name="applicant" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>选择模板</label>
            <select name="template_id" class="form-select" required>
                <option value="">请选择</option>
                {%for t in templates%}
                <option value="{{t.vmid}}">{{t.name}}(ID{{t.vmid}})</option>
                {%endfor%}
            </select>
        </div>
        <div class="mb-3">
            <label>桌面名称（可选）</label>
            <input name="vmname" class="form-control" placeholder="不填则自动生成">
        </div>
        <div class="mb-3">
            <label>申请理由</label>
            <textarea name="reason" class="form-control" rows="3"></textarea>
        </div>
        <button type="submit" class="btn btn-primary w-100">提交申请</button>
    </form>
</div>
</body>
</html>
