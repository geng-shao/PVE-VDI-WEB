<!DOCTYPE html><html><head><meta charset="utf-8"><title>用户登录</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"></head>
<body class="bg-light"><div class="container mt-5" style="max-width:400px"><h3 class="mb-3">云桌面用户登录</h3>
{% with messages = get_flashed_messages(with_categories=true) %}{% for cat, msg in messages %}<div class="alert alert-{{ cat }}">{{ msg }}</div>{% endfor %}{% endwith %}
<form method="post"><input type="hidden" name="action" value="login"><input name="username" class="form-control mb-2" placeholder="用户名" required>
<input type="password" name="password" class="form-control mb-2" placeholder="密码" required>
<button type="submit" class="btn btn-primary w-100">登录</button></form>
<p class="mt-3 text-muted">请使用管理员分配的账号登录</p></div></body></html>
